services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shoperator
      POSTGRES_PASSWORD: shoperator
      POSTGRES_DB: shoperator
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shoperator']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
